<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Star Wars Galaxy Map</title>
<style>
body { margin:0; overflow:hidden; background:black; color:white; font-family:Arial; }
#ui { position:absolute; top:10px; left:10px; z-index:10; }
#search { padding:6px; width:220px; font-size:14px; }
#tooltip { position:absolute; background:#111; border:1px solid #555; padding:8px; display:none; pointer-events:none; max-width:250px; }
#minimapContainer { position:absolute; bottom:10px; right:10px; width:200px; height:200px; border:1px solid #555; background:#000; z-index:9; }
#minimap { width:100%; height:100%; }
svg { width:100vw; height:100vh; }
circle:hover { cursor:pointer; }
</style>
</head>
<body>

<div id="ui">
<input id="search" placeholder="Planet suchen"><br>
<button onclick="toggleFaction()">Fraktionsmodus</button>
<button onclick="toggleZones()">Zonen anzeigen</button>
<button onclick="toggleRoutes()">Hyperraumrouten</button>
</div>

<div id="tooltip"></div>
<div id="minimapContainer"><svg id="minimap"></svg></div>
<svg id="map"></svg>

<script>
const map = document.getElementById("map")
const tooltip = document.getElementById("tooltip")
const search = document.getElementById("search")
const minimap = document.getElementById("minimap")

let planetsData = []
let factionMode = false, zonesVisible=true, routesVisible=true
let viewBox = {x:0, y:0, w:2000, h:2000}

// Zoom + Drag
let dragging=false, lastX, lastY
map.setAttribute("viewBox", `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`)

map.onwheel = e => {
  e.preventDefault()
  const factor = e.deltaY<0 ? 0.97 : 1.03
  viewBox.w*=factor
  viewBox.h*=factor
  setViewBox()
}

map.onmousedown = e => { dragging=true; lastX=e.clientX; lastY=e.clientY; }
map.onmouseup = () => dragging=false
map.onmouseleave = () => dragging=false
map.onmousemove = e => {
  if(dragging){
    let dx = (lastX-e.clientX)*(viewBox.w/ window.innerWidth)
    let dy = (lastY-e.clientY)*(viewBox.h/ window.innerHeight)
    viewBox.x += dx
    viewBox.y += dy
    lastX = e.clientX
    lastY = e.clientY
    setViewBox()
  }
}

function setViewBox(){ map.setAttribute("viewBox", `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`) }

// Toggle Buttons
function toggleFaction(){ factionMode=!factionMode; renderPlanets(); }
function toggleZones(){ zonesVisible=!zonesVisible; renderPlanets(); }
function toggleRoutes(){ routesVisible=!routesVisible; renderRoutes(); }

// Load planets.json
fetch("planets.json").then(r=>r.json()).then(data=>{
  planetsData=data
  renderPlanets()
  renderRoutes()
})

// Render Planets
function renderPlanets(){
  map.innerHTML=""
  planetsData.forEach(p=>{
    const circle = document.createElementNS("http://www.w3.org/2000/svg","circle")
    circle.setAttribute("cx", p.x)
    circle.setAttribute("cy", p.y)
    circle.setAttribute("r",6)
    if(factionMode) circle.setAttribute("fill", getFactionColor(p.faction))
    else circle.setAttribute("fill", getRegionColor(p.region))
    if(!zonesVisible) circle.setAttribute("fill","#fff")
    
    circle.onmouseenter = e=>{
      tooltip.style.display="block"
      tooltip.innerHTML = `<b>${p.name}</b><br>${p.description}<br><img src="${p.image}" style="width:100%;max-width:200px"><br><i>${p.faction}</i>`
    }
    circle.onmousemove = e=>{
      tooltip.style.left=e.clientX+10+"px"
      tooltip.style.top=e.clientY+10+"px"
    }
    circle.onclick = ()=> window.open(p.jedipedia,"_blank")
    map.appendChild(circle)
  })
}

// Color helpers
function getRegionColor(region){
  switch(region){
    case "Core": return "#00ffff"
    case "Mid Rim": return "#00ff00"
    case "Outer Rim": return "#ffaa00"
    case "Unknown": return "#ff00ff"
    default: return "#fff"
  }
}
function getFactionColor(faction){
  switch(faction){
    case "Galactic Republic": return "#1E90FF"
    case "Empire": return "#FF0000"
    case "Rebel Alliance": return "#00FF00"
    case "Jedi": return "#FFD700"
    default: return "#888"
  }
}

// Hyperraum Routen
let routes = [["Coruscant","Tatooine"],["Tatooine","Dagobah"],["Naboo","Geonosis"],["Hoth","Endor"]]
function renderRoutes(){
  // Entferne alte Linien
  map.querySelectorAll("line").forEach(l=>l.remove())
  if(!routesVisible) return
  routes.forEach(r=>{
    const p1 = planetsData.find(p=>p.name===r[0])
    const p2 = planetsData.find(p=>p.name===r[1])
    if(p1 && p2){
      const line = document.createElementNS("http://www.w3.org/2000/svg","line")
      line.setAttribute("x1",p1.x)
      line.setAttribute("y1",p1.y)
      line.setAttribute("x2",p2.x)
      line.setAttribute("y2",p2.y)
      line.setAttribute("stroke","#888")
      line.setAttribute("stroke-width","2")
      map.appendChild(line)
    }
  })
}

// Search + Zoom auf Planet
search.oninput = ()=>{
  const value = search.value.toLowerCase()
  const planet = planetsData.find(p=>p.name.toLowerCase().includes(value))
  if(planet){
    viewBox.x = planet.x - viewBox.w/2
    viewBox.y = planet.y - viewBox.h/2
    setViewBox()
  }
}
</script>

</body>
</html>
