<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Galaxy Map</title>
<style>
body { margin:0; background:black; color:white; font-family:Arial; overflow:hidden; }
#ui { position:absolute; top:10px; left:10px; z-index:20; }
#search { padding:8px; font-size:16px; width:250px; }
#tooltip {
 position:absolute;
 background:#111;
 border:1px solid #555;
 padding:12px;
 display:none;
 pointer-events:none;
 width:260px;
}
#tooltip img {
 width:100%;
 height:140px;
 object-fit:cover;
 margin-top:8px;
 border:1px solid #333;
}
</style>
</head>
<body>

<div id="ui">
<input id="search" placeholder="Planet suchen">
</div>

<div id="tooltip"></div>
<svg id="map" width="100vw" height="100vh" viewBox="0 0 2000 2000"></svg>

<script>
const map=document.getElementById("map")
const tooltip=document.getElementById("tooltip")
const search=document.getElementById("search")

let planets=[]
let viewBox={x:700,y:700,w:600,h:600}

fetch("planets.json")
.then(r=>r.json())
.then(data=>{
 planets=data
 drawPlanets()
})

function drawPlanets(){
 planets.forEach(p=>{
  const c=document.createElementNS("http://www.w3.org/2000/svg","circle")
  c.setAttribute("cx",p.x)
  c.setAttribute("cy",p.y)
  c.setAttribute("r",6)
  c.setAttribute("fill","#0ff")

  c.onmouseenter=e=>{
   tooltip.style.display="block"
   tooltip.innerHTML=`
    <b>${p.name}</b><br>
    ${p.sector}<br><br>
    ${p.description}
    <img src="https://source.unsplash.com/300x200/?planet,space">
   `
  }

  c.onmousemove=e=>{
   tooltip.style.left=e.clientX+15+"px"
   tooltip.style.top=e.clientY+15+"px"
  }

  c.onmouseleave=()=>tooltip.style.display="none"

  map.appendChild(c)
 })
}

// Auto Zoom bei Suche
search.oninput=e=>{
 const val=search.value.toLowerCase()
 const found=planets.find(p=>p.name.toLowerCase()===val)
 if(found){
  viewBox.w=400
  viewBox.h=400
  viewBox.x=found.x-200
  viewBox.y=found.y-200
  map.setAttribute("viewBox",`${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`)
 }
}

// Drag
let dragging=false,lastX,lastY
map.onmousedown=e=>{dragging=true;lastX=e.clientX;lastY=e.clientY}
map.onmouseup=e=>dragging=false
map.onmousemove=e=>{
 if(dragging){
  let dx=(e.clientX-lastX)*(viewBox.w/map.clientWidth)
  let dy=(e.clientY-lastY)*(viewBox.h/map.clientHeight)
  viewBox.x-=dx
  viewBox.y-=dy
  map.setAttribute("viewBox",`${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`)
  lastX=e.clientX
  lastY=e.clientY
 }
}

// Zoom
map.onwheel=e=>{
 e.preventDefault()
 const zoom=e.deltaY<0?0.9:1.1
 viewBox.w*=zoom
 viewBox.h*=zoom
 map.setAttribute("viewBox",`${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`)
}
</script>
</body>
</html>
