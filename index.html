<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Galaxy Map</title>

<style>
body {
 margin:0;
 background:black;
 overflow:hidden;
 font-family:Arial;
 color:white;
}

#ui {
 position:absolute;
 top:10px;
 left:10px;
 z-index:10;
 background:rgba(0,0,0,0.7);
 padding:10px;
 border-radius:8px;
}

button {
 margin-top:5px;
 width:160px;
}

#minimapContainer{
 position:absolute;
 right:20px;
 bottom:20px;
 width:250px;
 height:250px;
 border:2px solid white;
 background:black;
}

#minimap{
 width:100%;
 height:100%;
}

.tooltip{
 position:absolute;
 background:rgba(0,0,0,0.9);
 padding:10px;
 border-radius:6px;
 pointer-events:none;
 display:none;
 max-width:250px;
}

.route {
 stroke:#00ffff;
 stroke-width:2;
 fill:none;
 stroke-dasharray:8 8;
 animation:pulse 2s linear infinite;
}

@keyframes pulse {
 to { stroke-dashoffset:-16; }
}
</style>
</head>
<body>

<div id="ui">
<input id="search" placeholder="Planet suchen"><br>
<button onclick="toggleFaction()">Fraktionsmodus</button><br>
<button onclick="toggleRoutes()">Hyperraumrouten</button>
</div>

<div id="minimapContainer">
<svg id="minimap" viewBox="0 0 2000 2000"></svg>
</div>

<div id="tooltip" class="tooltip"></div>

<svg id="map" width="100vw" height="100vh" viewBox="0 0 2000 2000"></svg>

<script>
const map = document.getElementById("map")
const minimap = document.getElementById("minimap")
const tooltip = document.getElementById("tooltip")
const search = document.getElementById("search")

let factionMode = false
let routesVisible = true
let planetsData = []
let viewBox = {x:0,y:0,w:2000,h:2000}
let routes = [
 ["Coruscant","Corellia"],
 ["Corellia","Tatooine"],
 ["Coruscant","Naboo"],
 ["Naboo","Geonosis"],
 ["Hoth","Endor"],
 ["Endor","Coruscant"],
 ["Tatooine","Dagobah"],
 ["Dagobah","Ahch-To"]
]

function setViewBox(){
 map.setAttribute("viewBox",
  `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`)
}

function smoothCenter(x,y){
 const targetX = x - viewBox.w/2
 const targetY = y - viewBox.h/2
 let steps=30
 let dx=(targetX-viewBox.x)/steps
 let dy=(targetY-viewBox.y)/steps
 let i=0
 const interval=setInterval(()=>{
  viewBox.x+=dx
  viewBox.y+=dy
  setViewBox()
  i++
  if(i>=steps) clearInterval(interval)
 },16)
}

function factionColor(f){
 if(!f) return "white"
 if(f.includes("Republic")) return "cyan"
 if(f.includes("Empire")) return "red"
 if(f.includes("Rebel")) return "orange"
 if(f.includes("First")) return "yellow"
 if(f.includes("Sith")) return "purple"
 return "white"
}

function draw(){
 map.innerHTML=""
 minimap.innerHTML=""

 // Hyperraumlinien
 if(routesVisible){
  routes.forEach(r=>{
   const a = planetsData.find(p=>p.name===r[0])
   const b = planetsData.find(p=>p.name===r[1])
   if(a&&b){
    const line=document.createElementNS("http://www.w3.org/2000/svg","line")
    line.setAttribute("x1",a.x)
    line.setAttribute("y1",a.y)
    line.setAttribute("x2",b.x)
    line.setAttribute("y2",b.y)
    line.setAttribute("class","route")
    map.appendChild(line)
   }
  })
 }

 // Planeten zeichnen
 planetsData.forEach(p=>{
  const circle=document.createElementNS("http://www.w3.org/2000/svg","circle")
  circle.setAttribute("cx",p.x)
  circle.setAttribute("cy",p.y)
  circle.setAttribute("r",6)
  circle.setAttribute("fill",factionMode ? factionColor(p.affiliation) : "white")
  circle.dataset.name=p.name.toLowerCase()

  circle.onmouseenter=e=>{
   tooltip.style.display="block"
   tooltip.innerHTML=`<b>${p.name}</b><br>${p.region}<br>${p.affiliation}<br>${p.description}`
  }
  circle.onmousemove=e=>{
   tooltip.style.left=e.pageX+10+"px"
   tooltip.style.top=e.pageY+10+"px"
  }
  circle.onmouseleave=()=>tooltip.style.display="none"
  circle.onclick=()=>smoothCenter(p.x,p.y)

  map.appendChild(circle)

  // Mini-Map
  const mini=document.createElementNS("http://www.w3.org/2000/svg","circle")
  mini.setAttribute("cx",p.x)
  mini.setAttribute("cy",p.y)
  mini.setAttribute("r",3)
  mini.setAttribute("fill","white")
  minimap.appendChild(mini)
 })

 // Mini-Map Viewport Rechteck
 const rect=document.createElementNS("http://www.w3.org/2000/svg","rect")
 rect.setAttribute("x",viewBox.x)
 rect.setAttribute("y",viewBox.y)
 rect.setAttribute("width",viewBox.w)
 rect.setAttribute("height",viewBox.h)
 rect.setAttribute("fill","none")
 rect.setAttribute("stroke","red")
 minimap.appendChild(rect)
}

// Search
search.oninput=()=>{
 const val=search.value.toLowerCase()
 const found=planetsData.find(p=>p.name.toLowerCase()===val)
 if(found) smoothCenter(found.x,found.y)
}

// Toggle Fraktionen
function toggleFaction(){
 factionMode=!factionMode
 draw()
}

// Toggle Routen
function toggleRoutes(){
 routesVisible=!routesVisible
 draw()
}

// Mini-Map Klick
minimap.onclick=e=>{
 const rect=minimap.getBoundingClientRect()
 const scaleX=2000/rect.width
 const scaleY=2000/rect.height
 const x=(e.clientX-rect.left)*scaleX
 const y=(e.clientY-rect.top)*scaleY
 smoothCenter(x,y)
}

// Map Zoom
map.addEventListener("wheel",e=>{
 e.preventDefault()
 const zoom=e.deltaY>0?1.1:0.9
 viewBox.w*=zoom
 viewBox.h*=zoom
 setViewBox()
 draw()
})

// ✅ Planeten laden
fetch("planets.json")
.then(r=>r.json())
.then(data=>{
 planetsData = data
 viewBox = {x:900, y:850, w:800, h:800} // Startbereich
 draw()
})

setViewBox()
</script>

</body>
</html>
