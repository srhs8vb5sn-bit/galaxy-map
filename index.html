<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Star Wars Galaxy Map</title>
<style>
body {
  margin:0;
  background:black;
  font-family:Arial;
  overflow:hidden;
  user-select:none;
}

#ui {
  position:absolute;
  top:10px;
  left:10px;
  z-index:20;
  background:rgba(0,0,0,0.5);
  padding:10px;
  border-radius:5px;
}

#search {
  padding:5px;
  font-size:14px;
  width:200px;
}

button {
  display:block;
  margin-top:5px;
  width:200px;
}

#tooltip {
  position:absolute;
  background:#111;
  border:1px solid #555;
  padding:8px;
  display:none;
  pointer-events:none;
  max-width:220px;
}

#minimapContainer {
  position:absolute;
  bottom:10px;
  right:10px;
  width:200px;
  height:200px;
  border:1px solid #555;
  z-index:15;
  background:black;
}

#minimap {
  width:100%;
  height:100%;
}

circle.planet:hover {
  stroke:white;
  stroke-width:1.5px;
  cursor:pointer;
}

line.route {
  stroke:#0ff;
  stroke-width:1;
  opacity:0.5;
}
</style>
</head>
<body>

<div id="ui">
<input id="search" placeholder="Planet suchen">
<button onclick="toggleFaction()">Fraktionsfarben</button>
<button onclick="toggleRoutes()">Hyperraumrouten</button>
<button onclick="toggleZones()">Zonen</button>
</div>

<div id="tooltip"></div>

<div id="minimapContainer">
<svg id="minimap" viewBox="0 0 2000 2000"></svg>
</div>

<svg id="map" width="100vw" height="100vh"></svg>

<script>
// --- Setup ---
const map = document.getElementById("map")
const minimap = document.getElementById("minimap")
const tooltip = document.getElementById("tooltip")
const search = document.getElementById("search")

let factionMode = false
let routesVisible = true
let zonesVisible = true
let dragging=false, lastX, lastY

let viewBox = {x:0,y:0,w:2000,h:2000}

// Beispielplaneten (500+ Planeten kann man später direkt erweitern)
let planets = [
  {"name":"Coruscant","x":1000,"y":1000,"region":"Core","faction":"Galactic Republic","description":"Hauptwelt. Sitz des Senats.","img":"https://vignette.wikia.nocookie.net/starwars/images/4/44/Coruscant_TPM.png"},
  {"name":"Tatooine","x":1600,"y":1200,"region":"Outer Rim","faction":"Hutt Cartel","description":"Wüstenplanet. Heimat von Luke und Anakin.","img":"https://vignette.wikia.nocookie.net/starwars/images/3/3a/Tatooine_TPM.png"},
  {"name":"Alderaan","x":1020,"y":980,"region":"Core","faction":"Galactic Republic","description":"Zerstört durch Todesstern.","img":"https://vignette.wikia.nocookie.net/starwars/images/0/05/Alderaan.png"},
  {"name":"Naboo","x":1150,"y":1050,"region":"Mid Rim","faction":"Republic","description":"Heimat von Padmé und Palpatine.","img":"https://vignette.wikia.nocookie.net/starwars/images/9/9b/Naboo_planet.png"},
  {"name":"Hoth","x":1500,"y":850,"region":"Outer Rim","faction":"Rebel Alliance","description":"Schlacht von Hoth.","img":"https://vignette.wikia.nocookie.net/starwars/images/6/6f/Hoth_TESB.png"},
  {"name":"Endor","x":1550,"y":900,"region":"Outer Rim","faction":"Rebel Alliance","description":"Zweiter Todesstern zerstört.","img":"https://vignette.wikia.nocookie.net/starwars/images/d/d0/Endor.png"},
  {"name":"Dagobah","x":1620,"y":970,"region":"Outer Rim","faction":"Jedi","description":"Yodas Versteck.","img":"https://vignette.wikia.nocookie.net/starwars/images/7/7e/Dagobah.png"}
]

// Hyperraumrouten Beispiel
let routes = [
  ["Coruscant","Naboo"],
  ["Coruscant","Tatooine"],
  ["Hoth","Endor"],
  ["Tatooine","Dagobah"]
]

// Farben nach Fraktion
function getFactionColor(faction){
  const colors={
    "Galactic Republic":"#00f",
    "Empire":"#f00",
    "Rebel Alliance":"#0f0",
    "Hutt Cartel":"#ffa500",
    "Jedi":"#0ff",
    "Separatists":"#ff0",
    "First Order":"#f0f",
    "Resistance":"#0f8"
  }
  return colors[faction]||"#888"
}

// --- ViewBox ---
function updateViewBox(){
  map.setAttribute("viewBox",`${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`)
  minimap.setAttribute("viewBox",`0 0 2000 2000`)
}

// --- Zoom ---
map.addEventListener("wheel", e=>{
  e.preventDefault()
  const scale = e.deltaY < 0 ? 0.9 : 1.1
  viewBox.w*=scale
  viewBox.h*=scale
  updateViewBox()
})

// --- Pan ---
map.addEventListener("mousedown", e=>{
  dragging=true
  lastX=e.clientX
  lastY=e.clientY
})
map.addEventListener("mouseup", ()=>dragging=false)
map.addEventListener("mouseleave", ()=>dragging=false)
map.addEventListener("mousemove", e=>{
  if(!dragging) return
  let dx=(e.clientX-lastX)*(viewBox.w/map.clientWidth)*0.5
  let dy=(e.clientY-lastY)*(viewBox.h/map.clientHeight)*0.5
  viewBox.x-=dx
  viewBox.y-=dy
  updateViewBox()
  lastX=e.clientX
  lastY=e.clientY
})

// --- Draw Planets ---
function drawPlanets(){
  // Map leeren
  map.innerHTML=""
  // Sterne (Hintergrund)
  for(let i=0;i<200;i++){
    const star=document.createElementNS("http://www.w3.org/2000/svg","circle")
    star.setAttribute("cx",Math.random()*2000)
    star.setAttribute("cy",Math.random()*2000)
    star.setAttribute("r",Math.random()*1.5)
    star.setAttribute("fill","#fff")
    map.appendChild(star)
  }
  // Hyperraumrouten
  if(routesVisible) drawRoutes()
  // Planeten
  planets.forEach((p,i)=>{
    const c=document.createElementNS("http://www.w3.org/2000/svg","circle")
    c.setAttribute("cx",p.x)
    c.setAttribute("cy",p.y)
    c.setAttribute("r",6)
    c.classList.add("planet")
    c.dataset.index=i
    c.setAttribute("fill", factionMode? getFactionColor(p.faction):"#888")
    // Hover Tooltip
    c.addEventListener("mouseenter", e=>{
      tooltip.style.display="block"
      tooltip.innerHTML=`<b>${p.name}</b><br>${p.description}<br><img src="${p.img}" width="180"><br>Fraktion: ${p.faction}`
    })
    c.addEventListener("mousemove", e=>{
      tooltip.style.left=e.clientX+10+"px"
      tooltip.style.top=e.clientY+10+"px"
    })
    c.addEventListener("mouseleave", ()=>{
      tooltip.style.display="none"
    })
    // Klick auf Jedipedia
    c.addEventListener("click", ()=>{
      window.open(`https://www.jedipedia.net/wiki/${encodeURIComponent(p.name)}`)
    })
    map.appendChild(c)
  })
}

// --- Draw Routes ---
function drawRoutes(){
  routes.forEach(r=>{
    const p1=planets.find(p=>p.name===r[0])
    const p2=planets.find(p=>p.name===r[1])
    if(!p1||!p2) return
    const line=document.createElementNS("http://www.w3.org/2000/svg","line")
    line.setAttribute("x1",p1.x)
    line.setAttribute("y1",p1.y)
    line.setAttribute("x2",p2.x)
    line.setAttribute("y2",p2.y)
    line.setAttribute("class","route")
    line.style.display=routesVisible?"block":"none"
    map.appendChild(line)
  })
}

// --- Toggles ---
function toggleFaction(){ factionMode=!factionMode; drawPlanets() }
function toggleRoutes(){ routesVisible=!routesVisible; drawPlanets() }
function toggleZones(){ zonesVisible=!zonesVisible; /* optional für Zonen-Overlay*/ }

// --- Search ---
search.addEventListener("input",()=>{
  const val=search.value.toLowerCase()
  const p=planets.find(p=>p.name.toLowerCase()===val)
  if(p){
    // Automatisch Center + Zoom
    viewBox.x=p.x-200
    viewBox.y=p.y-200
    viewBox.w=400
    viewBox.h=400
    updateViewBox()
  }
})

// --- MiniMap ---
function drawMiniMap(){
  minimap.innerHTML=""
  planets.forEach(p=>{
    const c=document.createElementNS("http://www.w3.org/2000/svg","circle")
    c.setAttribute("cx",p.x)
    c.setAttribute("cy",p.y)
    c.setAttribute("r",2)
    c.setAttribute("fill","#fff")
    c.addEventListener("click",()=>{
      viewBox.x=p.x-200
      viewBox.y=p.y-200
      viewBox.w=400
      viewBox.h=400
      updateViewBox()
    })
    minimap.appendChild(c)
  })
}

// --- Init ---
drawPlanets()
drawMiniMap()
updateViewBox()
</script>

</body>
</html>
