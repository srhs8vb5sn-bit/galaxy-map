<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Galaxy Map</title>
<style>
body { margin:0; background:black; overflow:hidden; font-family:Arial; }
#search { position:absolute; top:10px; left:10px; padding:8px; z-index:10; width:250px; }
#tooltip {
 position:absolute;
 background:#111;
 border:1px solid #444;
 padding:10px;
 display:none;
 color:white;
 width:250px;
 pointer-events:none;
}
#tooltip img {
 width:100%;
 height:130px;
 object-fit:cover;
 margin-top:6px;
}
</style>
</head>
<body>

<input id="search" placeholder="Planet suchen">
<div id="tooltip"></div>
<svg id="map" width="100vw" height="100vh" viewBox="0 0 2000 2000"></svg>

<script>
const map=document.getElementById("map")
const tooltip=document.getElementById("tooltip")
const search=document.getElementById("search")

let viewBox={x:600,y:600,w:800,h:800}
let planets=[]

fetch("planets.json")
.then(r=>r.json())
.then(data=>{
 generate(data)
 draw()
})

function generate(data){
 const zones=[
  {name:"Core Worlds", min:0, max:200, list:data.core},
  {name:"Inner Rim", min:200, max:400, list:data.innerRim},
  {name:"Mid Rim", min:400, max:650, list:data.midRim},
  {name:"Outer Rim", min:650, max:900, list:data.outerRim},
  {name:"Unknown Regions", min:900, max:1200, list:data.unknown}
 ]

 zones.forEach(zone=>{
  zone.list.forEach(name=>{
   const angle=Math.random()*Math.PI*2
   const dist=Math.random()*(zone.max-zone.min)+zone.min
   planets.push({
    name,
    sector:zone.name,
    x:1000+Math.cos(angle)*dist,
    y:1000+Math.sin(angle)*dist
   })
  })
 })
}

function draw(){
 planets.forEach(p=>{
  const c=document.createElementNS("http://www.w3.org/2000/svg","circle")
  c.setAttribute("cx",p.x)
  c.setAttribute("cy",p.y)
  c.setAttribute("r",4)
  c.setAttribute("fill","#0ff")

  c.onmouseenter=e=>{
   tooltip.style.display="block"
   tooltip.innerHTML=`
    <b>${p.name}</b><br>
    ${p.sector}
    <img src="https://source.unsplash.com/300x200/?planet,space">
   `
  }

  c.onmousemove=e=>{
   tooltip.style.left=e.clientX+15+"px"
   tooltip.style.top=e.clientY+15+"px"
  }

  c.onmouseleave=()=>tooltip.style.display="none"

  map.appendChild(c)
 })
}

// Suche + Auto-Zoom
search.oninput=e=>{
 const val=search.value.toLowerCase()
 const found=planets.find(p=>p.name.toLowerCase()===val)
 if(found){
  viewBox.w=400
  viewBox.h=400
  viewBox.x=found.x-200
  viewBox.y=found.y-200
  map.setAttribute("viewBox",`${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`)
 }
}

// Drag
let dragging=false,lastX,lastY
map.onmousedown=e=>{dragging=true;lastX=e.clientX;lastY=e.clientY}
map.onmouseup=e=>dragging=false
map.onmousemove=e=>{
 if(dragging){
  let dx=(e.clientX-lastX)*(viewBox.w/map.clientWidth)
  let dy=(e.clientY-lastY)*(viewBox.h/map.clientHeight)
  viewBox.x-=dx
  viewBox.y-=dy
  map.setAttribute("viewBox",`${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`)
  lastX=e.clientX
  lastY=e.clientY
 }
}

// Zoom
map.onwheel=e=>{
 e.preventDefault()
 const zoom=e.deltaY<0?0.9:1.1
 viewBox.w*=zoom
 viewBox.h*=zoom
 map.setAttribute("viewBox",`${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`)
}
</script>
</body>
</html>
